<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIA SPORTS - مباريات مباشرة</title>
    
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0a0a0f; }
        
        /* Glassmorphism */
        .glass {
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* Live indicator */
        .live-pulse {
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        /* Score change animation */
        .score-flash {
            animation: flash 0.5s ease-out;
        }
        
        @keyframes flash {
            0% { transform: scale(1); color: white; }
            50% { transform: scale(1.3); color: #fbbf24; }
            100% { transform: scale(1); color: white; }
        }
        
        /* Match card hover */
        .match-card {
            transition: all 0.3s ease;
        }
        
        .match-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.3);
        }
    </style>
</head>
<body class="text-white">
    
    <!-- شريط التحميل -->
    <div id="loadingBar" class="fixed top-0 left-0 h-1 bg-gradient-to-r from-purple-600 to-blue-600 transition-all duration-300 z-50" style="width: 0%;"></div>
    
    <!-- Navbar -->
    <nav class="glass fixed top-0 left-0 right-0 z-40 border-b border-white/5">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-gradient-to-br from-purple-600 to-blue-600 rounded-xl flex items-center justify-center">
                        <i class="fas fa-futbol text-white text-sm"></i>
                    </div>
                    <span class="font-bold text-lg">
                        OMNIA<span class="text-purple-500">SPORTS</span>
                    </span>
                </div>
                
                <!-- Live indicator -->
                <div class="flex items-center gap-2">
                    <span class="live-pulse w-2 h-2 bg-red-500 rounded-full"></span>
                    <span class="text-sm font-bold text-red-500">LIVE</span>
                </div>
                
                <!-- Support Info -->
                <div class="hidden md:flex items-center gap-4 text-sm">
                    <i class="fas fa-user text-gray-400"></i>
                    <span class="text-gray-300">Omar Abdo</span>
                    <span class="text-purple-400 font-bold" dir="ltr">01289411976</span>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
    <main class="container mx-auto px-4 pt-24 pb-8">
        
        <!-- Header with filters -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
            <h1 class="text-3xl font-black bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">
                المباريات المباشرة
            </h1>
            
            <div class="flex gap-2 overflow-x-auto pb-2">
                <button class="px-4 py-2 bg-purple-600 rounded-full text-sm font-bold whitespace-nowrap">جميع المباريات</button>
                <button class="px-4 py-2 glass rounded-full text-sm whitespace-nowrap">الدوري الإنجليزي</button>
                <button class="px-4 py-2 glass rounded-full text-sm whitespace-nowrap">الدوري الإسباني</button>
                <button class="px-4 py-2 glass rounded-full text-sm whitespace-nowrap">دوري أبطال أوروبا</button>
                <button class="px-4 py-2 glass rounded-full text-sm whitespace-nowrap">المفضلة</button>
            </div>
        </div>
        
        <!-- Live Matches Grid -->
        <div id="matchesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- هنا هتتحط المباريات بالJavaScript -->
        </div>
        
        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="hidden text-center py-12">
            <div class="inline-block w-8 h-8 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
        
        <!-- Error Message -->
        <div id="errorMessage" class="hidden text-center py-12 text-red-500"></div>
    </main>
    
    <!-- Footer with Developer Info -->
    <footer class="glass border-t border-white/5 py-8 mt-12">
        <div class="container mx-auto px-4 text-center">
            <div class="flex flex-col items-center gap-4">
                <div class="w-16 h-16 bg-gradient-to-br from-purple-600 to-blue-600 rounded-2xl flex items-center justify-center">
                    <i class="fas fa-code text-2xl"></i>
                </div>
                <div>
                    <h3 class="text-xl font-bold">Omar Abdo</h3>
                    <p class="text-gray-400">Full Stack Developer & AI Engineer</p>
                </div>
                <div class="flex items-center gap-6 text-lg">
                    <a href="tel:01289411976" class="flex items-center gap-2 text-purple-400 hover:text-purple-300">
                        <i class="fas fa-phone-alt"></i>
                        <span dir="ltr">01289411976</span>
                    </a>
                    <a href="mailto:omar@omnia-sports.com" class="flex items-center gap-2 text-gray-400 hover:text-white">
                        <i class="fas fa-envelope"></i>
                        omar@omnia-sports.com
                    </a>
                </div>
                <div class="text-sm text-gray-500 mt-4">
                    © 2026 OMNIA SPORTS - جميع الحقوق محفوظة
                </div>
            </div>
        </div>
    </footer>
    
    <!-- Main JavaScript -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
  </html>
