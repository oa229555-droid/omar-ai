<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>OMNIA REAL | مباريات حقيقية مباشرة</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <!-- ربط ملفات المشروع -->
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body>
    <div class="app">
        <!-- شريط التحميل -->
        <div class="loading-bar" id="loadingBar"></div>
        
        <!-- الهيدر -->
        <div class="header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon"><i class="fas fa-futbol"></i></div>
                    <div class="logo-text">OMNIA <span>REAL</span></div>
                </div>
                <div class="live-badge"><span class="live-dot"></span><span>مباشر</span></div>
            </div>
        </div>
        
        <!-- قسم المطور -->
        <div class="developer-section">
            <div class="developer-content">
                <div class="developer-avatar"><i class="fas fa-user-astronaut"></i></div>
                <div class="developer-info">
                    <h3>المطور الرئيسي</h3>
                    <div class="name">Omar Abdo</div>
                    <div class="developer-phone"><i class="fas fa-phone-alt"></i><span>01289411976</span></div>
                </div>
            </div>
        </div>
        
        <!-- الفلاتر -->
        <div class="filters">
            <div class="filters-container">
                <button class="filter-btn active" onclick="filterMatches('all')"><i class="fas fa-globe"></i> كل المباريات</button>
                <button class="filter-btn" onclick="filterMatches('live')"><i class="fas fa-circle" style="color:#ef4444;"></i> المباشر الآن</button>
                <button class="filter-btn" onclick="filterMatches('champions')"><i class="fas fa-trophy"></i> دوري الأبطال</button>
            </div>
        </div>
        
        <!-- عنوان المباريات -->
        <div class="section-header">
            <h2><i class="fas fa-circle" style="color:#ef4444;"></i> مباريات حقيقية - تحديث مباشر</h2>
            <span class="update-time" id="updateTime">...</span>
        </div>
        
        <!-- المباريات -->
        <div id="matchesContainer" class="matches-container"></div>
        
        <!-- شاشات التحميل والخطأ -->
        <div id="loadingState" class="loading-state">
            <div class="spinner"></div>
            <p>جاري تحميل المباريات الحقيقية...</p>
        </div>
        
        <div id="errorState" class="error-state" style="display: none;">
            <i class="fas fa-exclamation-triangle"></i>
            <p>حدث خطأ في تحميل البيانات</p>
            <button class="retry-btn" onclick="fetchRealMatches()">إعادة المحاولة</button>
        </div>
        
        <!-- الفوتر -->
        <div class="footer">
            <div class="name">Omar Abdo</div>
            <div class="phone" dir="ltr"><i class="fas fa-phone-alt" style="margin-left:10px;"></i> 01289411976</div>
            <div style="font-size:12px; color:#475569;">© 2026 OMNIA REAL - بيانات حقيقية 100%</div>
        </div>
    </div>
    
    <!-- ربط ملف JavaScript (في الآخر) -->
    <script src="app.js"></script>
</body>
          </html>
