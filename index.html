<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>عمر شوت TV | البث المباشر للمباريات</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts - نفس خط المواقع الكبيرة -->
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Almarai', sans-serif;
        }
        
        body {
            background: #0a0c10;
            color: #fff;
        }
        
        .app {
            max-width: 500px;
            margin: 0 auto;
            background: #0f1217;
            min-height: 100vh;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        
        /* شريط التحميل */
        .loading-bar {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0%;
            height: 3px;
            background: linear-gradient(90deg, #00aaff, #0066cc);
            z-index: 9999;
            transition: width 0.3s ease;
            max-width: 500px;
        }
        
        /* الهيدر الرئيسي */
        .main-header {
            background: linear-gradient(135deg, #14181f, #0b0e12);
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #1e2630;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #00aaff, #0055aa);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,170,255,0.3);
        }
        
        .logo-icon i {
            font-size: 24px;
            color: white;
        }
        
        .logo-text h1 {
            font-size: 22px;
            font-weight: 800;
        }
        
        .logo-text span {
            color: #00aaff;
        }
        
        .logo-text .tv {
            font-size: 14px;
            background: #c5283d;
            padding: 2px 8px;
            border-radius: 20px;
            margin-right: 5px;
        }
        
        .live-indicator {
            background: #c5283d;
            padding: 6px 15px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 0 15px rgba(197,40,61,0.4);
        }
        
        .live-dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: livePulse 1s infinite;
        }
        
        @keyframes livePulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        
        /* معلومات المطور */
        .developer-info {
            background: #141b24;
            padding: 15px;
            border-bottom: 1px solid #1e2630;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .dev-avatar {
            width: 60px;
            height: 60px;
            background: #ffaa00;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(255,170,0,0.3);
        }
        
        .dev-avatar i {
            font-size: 30px;
            color: #0a0c10;
        }
        
        .dev-text h3 {
            font-size: 14px;
            color: #ffaa00;
            margin-bottom: 4px;
        }
        
        .dev-name {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 5px;
        }
        
        .dev-phone {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1e2630;
            padding: 6px 15px;
            border-radius: 30px;
            border: 1px solid #00aaff;
        }
        
        .dev-phone i {
            color: #00ff88;
        }
        
        .dev-phone span {
            font-size: 18px;
            font-weight: 700;
            direction: ltr;
        }
        
        /* شريط التصنيفات */
        .leagues-bar {
            background: #0f1217;
            padding: 15px 15px 5px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            border-bottom: 1px solid #1e2630;
        }
        
        .leagues-bar::-webkit-scrollbar {
            display: none;
        }
        
        .leagues-scroll {
            display: flex;
            gap: 10px;
        }
        
        .league-item {
            background: #1a212b;
            border: none;
            color: #9aa5b5;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #2a3440;
        }
        
        .league-item.active {
            background: #00aaff;
            color: white;
            border-color: #00aaff;
        }
        
        .league-item.live {
            background: #c5283d;
            color: white;
            border-color: #c5283d;
        }
        
        .league-item i {
            margin-left: 5px;
        }
        
        /* عنوان القسم */
        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 15px 10px;
        }
        
        .section-title h2 {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-title h2 i {
            color: #00aaff;
        }
        
        .update-time {
            background: #1a212b;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #9aa5b5;
        }
        
        /* بطاقة المباراة - زي المواقع الكبيرة بالظبط */
        .match-card {
            background: #141b24;
            margin: 0 15px 15px;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #1e2630;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .match-card:hover {
            border-color: #00aaff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,170,255,0.2);
        }
        
        .match-card.live {
            border-right: 4px solid #c5283d;
        }
        
        .match-card.live::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(197,40,61,0.05), transparent);
            pointer-events: none;
        }
        
        .match-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .league-name {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1e2630;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 12px;
            color: #9aa5b5;
        }
        
        .league-name i {
            color: #ffaa00;
        }
        
        .match-time {
            background: #1e2630;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .match-time.live {
            background: #c5283d;
            color: white;
        }
        
        /* الفرق والنتيجة */
        .teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        
        .team-logo {
            width: 60px;
            height: 60px;
            background: #0f1217;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 2px solid #1e2630;
        }
        
        .team-name {
            font-weight: 700;
            font-size: 14px;
            text-align: center;
        }
        
        .score {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 32px;
            font-weight: 800;
            padding: 0 15px;
        }
        
        .score span {
            min-width: 45px;
            text-align: center;
        }
        
        .score-divider {
            color: #4a5568;
            font-size: 24px;
        }
        
        /* معلومات البث والإحصائيات */
        .match-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 15px;
            border-top: 1px solid #1e2630;
        }
        
        .stream-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #00aaff;
            font-size: 13px;
        }
        
        .stats-preview {
            display: flex;
            gap: 15px;
            color: #9aa5b5;
            font-size: 12px;
        }
        
        .stats-preview i {
            margin-left: 4px;
        }
        
        /* شبكة المباريات */
        .matches-grid {
            padding: 0 0 20px;
        }
        
        /* حالة عدم وجود مباريات */
        .no-matches {
            text-align: center;
            padding: 40px;
            color: #9aa5b5;
        }
        
        .no-matches i {
            font-size: 50px;
            margin-bottom: 15px;
            color: #2a3440;
        }
        
        /* الفوتر */
        .footer {
            background: #0b0e12;
            padding: 30px 15px;
            margin-top: 30px;
            border-top: 1px solid #1e2630;
            text-align: center;
        }
        
        .footer-logo {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 10px;
        }
        
        .footer-logo span {
            color: #00aaff;
        }
        
        .footer-dev {
            color: #9aa5b5;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .footer-phone {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #00aaff, #0066cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            direction: ltr;
        }
        
        /* شاشة التحميل */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            height: 100%;
            background: #0f1217;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.3s;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #1e2630;
            border-top-color: #00aaff;
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- شريط التحميل -->
        <div class="loading-bar" id="loadingBar"></div>
        
        <!-- شاشة التحميل -->
        <div class="loading-screen" id="loadingScreen">
            <div class="loading-spinner"></div>
        </div>
        
        <!-- الهيدر -->
        <header class="main-header">
            <div class="header-content">
                <div class="logo-area">
                    <div class="logo-icon">
                        <i class="fas fa-tv"></i>
                    </div>
                    <div class="logo-text">
                        <h1>عمر <span>شوت</span> <span class="tv">TV</span></h1>
                    </div>
                </div>
                <div class="live-indicator">
                    <span class="live-dot"></span>
                    <span>مباشر</span>
                </div>
            </div>
        </header>
        
        <!-- معلومات المطور -->
        <div class="developer-info">
            <div class="dev-avatar">
                <i class="fas fa-user-cog"></i>
            </div>
            <div class="dev-text">
                <h3>المطور الرئيسي</h3>
                <div class="dev-name">Omar Abdo</div>
                <div class="dev-phone">
                    <i class="fas fa-phone-alt"></i>
                    <span dir="ltr">01289411976</span>
                </div>
            </div>
        </div>
        
        <!-- شريط الدوريات -->
        <div class="leagues-bar">
            <div class="leagues-scroll" id="leaguesList">
                <button class="league-item active" onclick="filterMatches('all')"><i class="fas fa-globe"></i> الكل</button>
                <button class="league-item live" onclick="filterMatches('live')"><i class="fas fa-circle"></i> المباشر</button>
                <button class="league-item" onclick="filterMatches('champions')"><i class="fas fa-trophy"></i> دوري الأبطال</button>
                <button class="league-item" onclick="filterMatches('premier')"><i class="fas fa-crown"></i> الدوري الإنجليزي</button>
                <button class="league-item" onclick="filterMatches('laliga')"><i class="fas fa-crown"></i> الدوري الإسباني</button>
                <button class="league-item" onclick="filterMatches('seriea')"><i class="fas fa-crown"></i> الدوري الإيطالي</button>
                <button class="league-item" onclick="filterMatches('bundes')"><i class="fas fa-crown"></i> الدوري الألماني</button>
            </div>
        </div>
        
        <!-- عنوان المباريات -->
        <div class="section-title">
            <h2>
                <i class="fas fa-futbol"></i>
                <span id="sectionTitle">جميع المباريات</span>
            </h2>
            <span class="update-time" id="updateTime">...</span>
        </div>
        
        <!-- شبكة المباريات -->
        <div id="matchesGrid" class="matches-grid">
            <!-- المباريات هتتحط هنا -->
        </div>
        
        <!-- الفوتر -->
        <footer class="footer">
            <div class="footer-logo">
                عمر <span>شوت</span> TV
            </div>
            <div class="footer-dev">
                <i class="fas fa-code"></i> تم التطوير بواسطة <strong>Omar Abdo</strong>
            </div>
            <div class="footer-phone" dir="ltr">
                01289411976
            </div>
        </footer>
    </div>
    
    <script>
        // بيانات المباريات (هتتحدث تلقائياً)
        const leagues = [
            { id: 'champions', name: 'دوري أبطال أوروبا', icon: 'fa-trophy' },
            { id: 'premier', name: 'الدوري الإنجليزي', icon: 'fa-crown' },
            { id: 'laliga', name: 'الدوري الإسباني', icon: 'fa-crown' },
            { id: 'seriea', name: 'الدوري الإيطالي', icon: 'fa-crown' },
            { id: 'bundes', name: 'الدوري الألماني', icon: 'fa-crown' },
            { id: 'ligue1', name: 'الدوري الفرنسي', icon: 'fa-crown' }
        ];
        
        // أندية كل دوري
        const teams = {
            champions: ['ريال مدريد', 'برشلونة', 'بايرن ميونخ', 'مانشستر سيتي', 'ليفربول', 'باريس سان جيرمان', 'إنتر ميلان', 'يوفنتوس', 'أياكس', 'بورتو'],
            premier: ['مانشستر سيتي', 'ليفربول', 'آرسنال', 'تشيلسي', 'مانشستر يونايتد', 'توتنهام', 'نيوكاسل', 'أستون فيلا', 'برايتون', 'وست هام'],
            laliga: ['ريال مدريد', 'برشلونة', 'أتلتيكو مدريد', 'ريال سوسيداد', 'أتلتيك بيلباو', 'فالنسيا', 'إشبيلية', 'فياريال', 'ريال بيتيس', 'خيتافي'],
            seriea: ['إنتر ميلان', 'يوفنتوس', 'ميلان', 'نابولي', 'روما', 'لاتسيو', 'فيورنتينا', 'أتالانتا', 'بولونيا', 'تورينو'],
            bundes: ['بايرن ميونخ', 'بوروسيا دورتموند', 'باير ليفركوزن', 'لايبزيغ', 'آينتراخت فرانكفورت', 'فولفسبورغ', 'ماينتس', 'بروسيا مونشنغلادباخ', 'فيردر بريمن', 'هوفنهايم'],
            ligue1: ['باريس سان جيرمان', 'مارسيليا', 'موناكو', 'ليون', 'ليل', 'رين', 'نيس', 'لنس', 'ستراسبورغ', 'نانت']
        };
        
        // توليد المباريات
        function generateMatches() {
            const matches = [];
            
            for (let i = 0; i < 25; i++) {
                const leagueIndex = Math.floor(Math.random() * leagues.length);
                const league = leagues[leagueIndex];
                const leagueTeams = teams[league.id];
                
                let homeIndex, awayIndex;
                do {
                    homeIndex = Math.floor(Math.random() * leagueTeams.length);
                    awayIndex = Math.floor(Math.random() * leagueTeams.length);
                } while (homeIndex === awayIndex);
                
                const homeTeam = leagueTeams[homeIndex];
                const awayTeam = leagueTeams[awayIndex];
                const isLive = Math.random() > 0.6;
                const homeScore = isLive ? Math.floor(Math.random() * 4) : 0;
                const awayScore = isLive ? Math.floor(Math.random() * 4) : 0;
                const minute = isLive ? Math.floor(Math.random() * 90) + 1 : '';
                const status = isLive ? 'live' : 'scheduled';
                
                matches.push({
                    id: i,
                    league: league.name,
                    leagueId: league.id,
                    leagueIcon: league.icon,
                    homeTeam,
                    awayTeam,
                    homeScore,
                    awayScore,
                    status,
                    minute,
                    time: `${Math.floor(Math.random() * 12) + 10}:${Math.floor(Math.random() * 60).toString().padStart(2, '0')}`,
                    streams: Math.floor(Math.random() * 4) + 2,
                    possession: `${Math.floor(Math.random() * 30) + 40}%`,
                    shots: `${Math.floor(Math.random() * 15) + 5}`,
                    onTarget: `${Math.floor(Math.random() * 8) + 2}`
                });
            }
            
            return matches;
        }
        
        let allMatches = generateMatches();
        let currentFilter = 'all';
        
        // عناصر DOM
        const loadingBar = document.getElementById('loadingBar');
        const loadingScreen = document.getElementById('loadingScreen');
        const matchesGrid = document.getElementById('matchesGrid');
        const updateTimeSpan = document.getElementById('updateTime');
        const sectionTitle = document.getElementById('sectionTitle');
        
        // شريط التحميل
        function showLoading(percent) {
            loadingBar.style.width = percent + '%';
        }
        
        // عرض المباريات
        function renderMatches() {
            let filteredMatches = allMatches;
            
            if (currentFilter === 'live') {
                filteredMatches = allMatches.filter(m => m.status === 'live');
                sectionTitle.textContent = 'المباريات المباشرة';
            } else if (currentFilter !== 'all') {
                const league = leagues.find(l => l.id === currentFilter);
                filteredMatches = allMatches.filter(m => m.leagueId === currentFilter);
                sectionTitle.textContent = league ? league.name : 'جميع المباريات';
            } else {
                sectionTitle.textContent = 'جميع المباريات';
            }
            
            if (filteredMatches.length === 0) {
                matchesGrid.innerHTML = `
                    <div class="no-matches">
                        <i class="fas fa-futbol"></i>
                        <p>لا توجد مباريات في هذا التصنيف</p>
                    </div>
                `;
                return;
            }
            
            matchesGrid.innerHTML = filteredMatches.map(match => {
                const isLive = match.status === 'live';
                
                return `
                    <div class="match-card ${isLive ? 'live' : ''}" onclick="window.open('https://www.viprow.nu/', '_blank')">
                        <div class="match-header">
                            <div class="league-name">
                                <i class="fas ${match.leagueIcon}"></i>
                                <span>${match.league}</span>
                            </div>
                            <div class="match-time ${isLive ? 'live' : ''}">
                                ${isLive ? `<i class="fas fa-circle" style="font-size:8px;"></i> ${match.minute}'` : match.time}
                            </div>
                        </div>
                        
                        <div class="teams">
                            <div class="team">
                                <div class="team-logo"><i class="fas fa-shield-alt"></i></div>
                                <div class="team-name">${match.homeTeam}</div>
                            </div>
                            
                            <div class="score">
                                <span>${match.homeScore}</span>
                                <span class="score-divider">-</span>
                                <span>${match.awayScore}</span>
                            </div>
                            
                            <div class="team">
                                <div class="team-logo"><i class="fas fa-shield-alt"></i></div>
                                <div class="team-name">${match.awayTeam}</div>
                            </div>
                        </div>
                        
                        <div class="match-footer">
                            <div class="stream-info">
                                <i class="fas fa-play"></i>
                                <span>${match.streams} روابط بث مباشر</span>
                            </div>
                            <div class="stats-preview">
                                <span><i class="fas fa-chart-pie"></i> ${match.possession}</span>
                                <span><i class="fas fa-futbol"></i> ${match.shots}</span>
                                <span><i class="fas fa-bullseye"></i> ${match.onTarget}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // تصفية المباريات
        function filterMatches(filter) {
            currentFilter = filter;
            
            document.querySelectorAll('.league-item').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderMatches();
        }
        
        // تحديث الوقت
        function updateClock() {
            const now = new Date();
            updateTimeSpan.textContent = now.getHours().toString().padStart(2,'0') + ':' + 
                                        now.getMinutes().toString().padStart(2,'0') + ':' + 
                                        now.getSeconds().toString().padStart(2,'0');
        }
        
        // تحديث النتائج
        function updateScores() {
            allMatches.forEach(match => {
                if (match.status === 'live' && Math.random() > 0.8) {
                    if (Math.random() > 0.5) {
                        match.homeScore++;
                    } else {
                        match.awayScore++;
                    }
                    
                    let min = parseInt(match.minute);
                    if (min < 90) {
                        match.minute = (min + 1).toString();
                    } else if (min === 90) {
                        match.minute = '90+';
                    } else {
                        let extra = parseInt(match.minute.replace('90+', '')) || 1;
                        if (extra < 5) {
                            match.minute = '90+' + (extra + 1);
                        }
                    }
                }
            });
            
            renderMatches();
        }
        
        // تهيئة الصفحة
        window.onload = function() {
            showLoading(30);
            
            setTimeout(() => {
                showLoading(70);
                renderMatches();
                updateClock();
                
                showLoading(100);
                setTimeout(() => {
                    showLoading(0);
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                    }, 300);
                }, 500);
            }, 1000);
            
            setInterval(updateClock, 1000);
            setInterval(updateScores, 15000);
        };
    </script>
</body>
</html>
