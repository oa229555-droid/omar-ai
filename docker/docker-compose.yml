# docker/docker-compose.yml
version: '3.8'

services:
  titan-core:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: titan-omega-core
    ports:
      - "8000:8000"
    environment:
      - TITAN_MASTER_KEY=${TITAN_MASTER_KEY}
      - TITAN_SIGNING_KEY=${TITAN_SIGNING_KEY}
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432/titan
      - KAFKA_SERVERS=kafka:9092
    volumes:
      - ../models:/app/models
      - ../data:/app/data
      - ../training:/app/training
      - ../logs:/app/logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - titan-network
    depends_on:
      - redis
      - postgres
      - kafka

  redis:
    image: redis:7-alpine
    container_name: titan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    networks:
      - titan-network

  postgres:
    image: postgres:15-alpine
    container_name: titan-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=titan
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - titan-network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: titan-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    networks:
      - titan-network
    depends_on:
      - zookeeper

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: titan-zookeeper
    ports:
      - "2181:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    networks:
      - titan-network

  nginx:
    image: nginx:alpine
    container_name: titan-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ../frontend:/usr/share/nginx/html
      - ../ssl:/etc/nginx/ssl
    networks:
      - titan-network
    depends_on:
      - titan-core

  trainer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.trainer
    container_name: titan-trainer
    environment:
      - TITAN_MASTER_KEY=${TITAN_MASTER_KEY}
      - TRAINING_MODE=continuous
      - TRAINING_INTERVAL=24
    volumes:
      - ../models:/app/models
      - ../data:/app/data
      - ../training:/app/training
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - titan-network
    depends_on:
      - titan-core

networks:
  titan-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
