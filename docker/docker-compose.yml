version: '3.8'

services:
  # MongoDB
  mongodb:
    image: mongo:6
    container_name: omnia-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: omnia-ai
    volumes:
      - mongodb_data:/data/db
    networks:
      - omnia-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: omnia-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis123
    volumes:
      - redis_data:/data
    networks:
      - omnia-network

  # Backend API
  backend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.backend
    container_name: omnia-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/omnia-ai?authSource=admin
      REDIS_URL: redis://:redis123@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - mongodb
      - redis
    volumes:
      - ../logs:/app/logs
      - ../uploads:/app/uploads
    networks:
      - omnia-network

  # Frontend (if serving static files)
  frontend:
    build:
      context: ../
      dockerfile: docker/Dockerfile.frontend
    container_name: omnia-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - omnia-network

  # Nginx as reverse proxy
  nginx:
    image: nginx:alpine
    container_name: omnia-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ../ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - omnia-network

volumes:
  mongodb_data:
  redis_data:

networks:
  omnia-network:
    driver: bridge
