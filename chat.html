<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN-OMEGA - المحادثة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; }
        .message-ai { background: #1e293b; }
        .message-user { background: #7c3aed; }
        .chat-container { height: calc(100vh - 120px); }
    </style>
</head>
<body class="text-white">
    <nav class="bg-gray-900 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <button onclick="window.location.href='index.html'" class="text-xl">
                <i class="fas fa-arrow-right"></i>
            </button>
            <h1 class="text-xl font-bold">TITAN-<span class="text-purple-400">OMEGA</span></h1>
            <select id="modelSelect" class="bg-gray-800 px-3 py-1 rounded-lg text-sm">
                <option value="gpt4">GPT-4 Turbo</option>
                <option value="claude">Claude 3</option>
                <option value="gemini">Gemini Pro</option>
                <option value="mixtral">Mixtral</option>
            </select>
        </div>
    </nav>
    
    <div class="container mx-auto p-4 chat-container flex flex-col">
        <div id="messages" class="flex-1 overflow-y-auto mb-4 space-y-4"></div>
        
        <div class="bg-gray-800 rounded-lg p-2">
            <textarea id="userInput" rows="1" class="w-full bg-transparent border-0 outline-none resize-none p-2 text-white" placeholder="اكتب رسالتك هنا..."></textarea>
            <div class="flex justify-between items-center">
                <div class="flex gap-2">
                    <button onclick="addQuickPrompt('اكتب كود')" class="text-sm bg-gray-700 px-3 py-1 rounded-full">✍️ كود</button>
                    <button onclick="addQuickPrompt('ترجم')" class="text-sm bg-gray-700 px-3 py-1 rounded-full">🌐 ترجم</button>
                    <button onclick="addQuickPrompt('لخص')" class="text-sm bg-gray-700 px-3 py-1 rounded-full">📝 لخص</button>
                </div>
                <button id="sendBtn" onclick="sendMessage()" class="bg-purple-600 px-6 py-2 rounded-lg hover:bg-purple-700 disabled:opacity-50" disabled>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
    
    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
            sendBtn.disabled = this.value.trim() === '';
        });
        
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!sendBtn.disabled) sendMessage();
            }
        });
        
        function addQuickPrompt(text) {
            userInput.value = text + ' ';
            userInput.style.height = 'auto';
            sendBtn.disabled = false;
        }
        
        function addMessage(content, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex ${isUser ? 'justify-end' : 'justify-start'} mb-4`;
            messageDiv.innerHTML = `
                <div class="max-w-[80%] ${isUser ? 'message-user' : 'message-ai'} rounded-2xl p-4">
                    <p class="text-sm">${content}</p>
                </div>
            `;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'flex justify-start mb-4';
            typingDiv.innerHTML = `
                <div class="message-ai rounded-2xl p-4">
                    <div class="flex gap-1">
                        <span class="animate-bounce">.</span>
                        <span class="animate-bounce delay-100">.</span>
                        <span class="animate-bounce delay-200">.</span>
                    </div>
                </div>
            `;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }
        
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            addMessage(message, true);
            userInput.value = '';
            sendBtn.disabled = true;
            userInput.style.height = 'auto';
            
            showTyping();
            
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer gsk_YOUR_KEY_HERE'
                    },
                    body: JSON.stringify({
                        model: 'mixtral-8x7b-32768',
                        messages: [{ role: 'user', content: message }]
                    })
                });
                
                const data = await response.json();
                hideTyping();
                addMessage(data.choices[0].message.content, false);
                
            } catch (error) {
                hideTyping();
                addMessage('عذراً، حدث خطأ. تأكد من مفتاح API', false);
                console.error(error);
            }
        }
        
        // رسالة ترحيب
        addMessage('مرحباً! أنا TITAN-OMEGA. كيف يمكنني مساعدتك؟', false);
    </script>
</body>
</html>
